services:
  omnitrack:
    build: .
    container_name: omnitrack-datalayer-studio
    restart: unless-stopped
    ports:
      - "3010:3010"
    environment:
      - PORT=3010
      - NODE_ENV=production
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OMNIBOT_ENDPOINT=${OMNIBOT_ENDPOINT:-}
      - OMNIBOT_API_KEY=${OMNIBOT_API_KEY:-}
    env_file:
      - .env
